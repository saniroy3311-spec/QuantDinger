databases:
  - name: quantdinger-db
    plan: free

services:
  - type: redis
    name: quantdinger-redis
    plan: free
    ipAllowList: []

  - type: web
    name: quantdinger-api
    plan: free
    env: docker
    dockerContext: backend_api_python
    dockerfilePath: Dockerfile
    dockerCommand: sh render-start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quantdinger-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: quantdinger-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: PORT
        value: 10000
