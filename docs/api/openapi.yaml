info:
  description: 'Human-facing REST API for QuantDinger. Agent integrations use `/api/agent/v1`
    — see `docs/agent/agent-openapi.json`. Conventions: `docs/architecture/API_CONVENTIONS.md`.'
  contact:
    name: QuantDinger
    url: https://github.com/brokermr810/quantdinger
  license:
    name: See repository LICENSE
  title: QuantDinger Web API
  version: 1.0.0
components:
  securitySchemes:
    HumanJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'User session JWT from `POST /api/auth/login`. Send as `Authorization:
        Bearer <token>`.'
    AgentToken:
      type: http
      scheme: bearer
      bearerFormat: qd_agent_xxx
      description: Agent Gateway token for `/api/agent/v1/*` only. See docs/agent/AGENT_QUICKSTART.md.
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          description: Error code
        status:
          type: string
          description: Error name
        message:
          type: string
          description: Error message
        errors:
          type: object
          description: Errors
          additionalProperties: {}
      additionalProperties: false
    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items.
        total_pages:
          type: integer
          description: Total number of pages.
        first_page:
          type: integer
          description: First available page number.
        last_page:
          type: integer
          description: Last available page number.
        page:
          type: integer
          description: Current page number.
        previous_page:
          type: integer
          description: Previous page number.
        next_page:
          type: integer
          description: Next page number.
      additionalProperties: false
    HumanSuccessEnvelope:
      type: object
      properties:
        code:
          type: integer
          description: 1 on success
          example: 1
        msg:
          type: string
          example: success
        data:
          nullable: true
      additionalProperties: false
    HumanErrorEnvelope:
      type: object
      properties:
        code:
          type: integer
          description: 0 on error
          example: 0
        msg:
          type: string
        data:
          nullable: true
      additionalProperties: false
    AgentSuccessEnvelope:
      type: object
      properties:
        code:
          type: integer
          description: 0 on success
          example: 0
        message:
          type: string
        data:
          nullable: true
      additionalProperties: false
    AgentError:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          nullable: true
        retriable:
          type: boolean
      additionalProperties: false
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
      additionalProperties: false
    ApiInfo:
      type: object
      properties:
        name:
          type: string
          example: QuantDinger Python API
        version:
          type: string
          example: 5.0.1
        status:
          type: string
          example: running
        timestamp:
          type: string
          format: date-time
      additionalProperties: false
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
        role:
          type: string
          example: api
      additionalProperties: false
    ReadinessStatus:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
        role:
          type: string
          example: api
        checks:
          type: object
          additionalProperties:
            type: boolean
      additionalProperties: false
    WorkerHealth:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
        role:
          type: string
          example: api
        workers:
          type: array
          items:
            type: object
            additionalProperties: {}
      additionalProperties: false
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 254
        account:
          type: string
          minLength: 1
          maxLength: 254
        password:
          type: string
          minLength: 1
          maxLength: 1024
        turnstile_token:
          type: string
          maxLength: 4096
          nullable: true
        turnstile_clearance:
          type: string
          maxLength: 4096
          nullable: true
      required:
      - password
      additionalProperties: false
    UserInfo:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        nickname:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        avatar:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        role:
          nullable: true
      additionalProperties: false
    LoginData:
      type: object
      properties:
        token:
          type: string
        userinfo:
          $ref: '#/components/schemas/UserInfo'
      required:
      - token
      - userinfo
      additionalProperties: false
    LoginResponse:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          anyOf:
          - type: object
            nullable: true
          - $ref: '#/components/schemas/LoginData'
      required:
      - code
      - msg
      additionalProperties: false
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        code:
          type: string
          minLength: 1
          maxLength: 32
        username:
          type: string
          minLength: 3
          maxLength: 30
        password:
          type: string
          minLength: 1
          maxLength: 1024
        referral_code:
          type: string
          default: ''
          maxLength: 64
      required:
      - code
      - email
      - password
      - username
      additionalProperties: false
    ResetPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        code:
          type: string
          minLength: 1
          maxLength: 32
        new_password:
          type: string
          minLength: 1
          maxLength: 1024
      required:
      - code
      - email
      - new_password
      additionalProperties: false
    ChangePasswordRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 32
        new_password:
          type: string
          minLength: 1
          maxLength: 1024
      required:
      - code
      - new_password
      additionalProperties: false
    CredentialCreateRequest:
      type: object
      properties:
        name:
          type: string
          default: ''
          maxLength: 128
        exchange_id:
          type: string
          minLength: 1
          maxLength: 32
        api_key:
          type: string
          default: ''
          maxLength: 4096
        apiKey:
          type: string
          default: ''
          maxLength: 4096
        secret_key:
          type: string
          default: ''
          maxLength: 4096
        secretKey:
          type: string
          default: ''
          maxLength: 4096
        passphrase:
          type: string
          default: ''
          maxLength: 4096
        base_url:
          type: string
          default: ''
          maxLength: 2048
          nullable: true
        baseUrl:
          type: string
          default: ''
          maxLength: 2048
          nullable: true
        enable_demo_trading:
          type: boolean
          default: false
        demo:
          type: boolean
          default: false
        sandbox:
          type: boolean
          default: false
        testnet:
          type: boolean
          default: false
        environment:
          type: string
          default: ''
          maxLength: 32
        network:
          type: string
          default: ''
          maxLength: 32
        market_scope:
          type: string
          default: ''
          enum:
          - ''
          - spot
          - swap
          - both
        marketScope:
          type: string
          default: ''
          maxLength: 32
        ibkr_host:
          type: string
          default: 127.0.0.1
          maxLength: 255
        ibkr_port:
          type: integer
          default: 7497
          minimum: 1
          maximum: 65535
        ibkr_client_id:
          type: integer
          default: 7
          minimum: 0
          maximum: 2147483647
        ibkr_account:
          type: string
          default: ''
          maxLength: 128
      required:
      - exchange_id
      additionalProperties: false
    CredentialCreatedData:
      type: object
      properties:
        id:
          type: integer
      required:
      - id
      additionalProperties: false
    CredentialCreatedResponse:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          anyOf:
          - type: object
            nullable: true
          - $ref: '#/components/schemas/CredentialCreatedData'
      required:
      - code
      - msg
      additionalProperties: false
    BillingOrderRequest:
      type: object
      properties:
        plan:
          type: string
          enum:
          - monthly
          - yearly
          - lifetime
        chain:
          type: string
          default: null
          enum:
          - TRC20
          - BEP20
          - ERC20
          - SOL
          - null
          nullable: true
      required:
      - plan
      additionalProperties: false
    QuickTradeOrderRequest:
      type: object
      properties:
        credential_id:
          type: integer
          minimum: 1
        symbol:
          type: string
          minLength: 1
          maxLength: 64
        side:
          type: string
          enum:
          - buy
          - sell
        order_type:
          type: string
          default: market
          enum:
          - market
          - limit
        amount:
          type: number
          minimum: 0.0
        price:
          type: number
          default: 0.0
          minimum: 0.0
        leverage:
          type: integer
          default: 1
          minimum: 1
          maximum: 125
        market_type:
          type: string
          default: ''
          enum:
          - ''
          - spot
          - swap
          - futures
          - future
          - perp
          - perpetual
        tp_price:
          type: number
          default: 0.0
          minimum: 0.0
        sl_price:
          type: number
          default: 0.0
          minimum: 0.0
        source:
          type: string
          default: manual
          maxLength: 64
        margin_mode:
          type: string
          default: ''
          maxLength: 16
        marginMode:
          type: string
          default: ''
          maxLength: 16
      required:
      - amount
      - credential_id
      - side
      - symbol
      additionalProperties: false
    QuickTradeCloseRequest:
      type: object
      properties:
        credential_id:
          type: integer
          minimum: 1
        symbol:
          type: string
          minLength: 1
          maxLength: 64
        market_type:
          type: string
          default: swap
          enum:
          - spot
          - swap
          - futures
          - future
          - perp
          - perpetual
        size:
          type: number
          default: 0.0
          minimum: 0.0
        close_scope:
          type: string
          default: full
          maxLength: 32
        closeScope:
          type: string
          default: ''
          maxLength: 32
        position_side:
          type: string
          default: ''
          enum:
          - ''
          - long
          - short
        close_side:
          type: string
          default: ''
          enum:
          - ''
          - long
          - short
        source:
          type: string
          default: manual
          maxLength: 64
      required:
      - credential_id
      - symbol
      additionalProperties: false
  responses:
    DEFAULT_ERROR:
      description: Default error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UNPROCESSABLE_CONTENT:
      description: Unprocessable Content
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
tags:
- name: Health
  description: Liveness and API metadata (Public)
- name: Policy
  description: Capability and broker policy discovery (Public)
- name: Auth
  description: Authentication and OAuth (Public)
- name: Users
  description: User profile and administration (Mixed)
- name: Market
  description: Market data and watchlists (Public)
- name: Universe
  description: Point-in-time strategy universes (Internal)
- name: Factor
  description: Versioned factor catalog and research diagnostics (Internal)
- name: Indicator
  description: Indicator IDE workspace (Public)
- name: Backtest
  description: Unified V2 backtesting (Public)
- name: Strategy
  description: Strategy runtime and bots (Internal)
- name: Account
  description: Trading account snapshots and positions (Internal)
- name: Community
  description: Indicator marketplace (Public)
- name: Credentials
  description: Exchange credential vault (Internal)
- name: Dashboard
  description: Dashboard aggregates (Internal)
- name: Portfolio
  description: Manual portfolio tracking (Internal)
- name: Settings
  description: System and brand settings (Mixed)
- name: Billing
  description: Membership and USDT billing (Internal)
- name: FastAnalysis
  description: Fast AI analysis (Public)
- name: GlobalMarket
  description: Global market overview (Public)
- name: AIChat
  description: Legacy AI chat compatibility (Internal)
- name: QuickTrade
  description: Manual quick trade (Internal)
- name: IBKR
  description: Interactive Brokers adapter (Internal)
- name: Alpaca
  description: Alpaca adapter (Internal)
servers:
- url: http://localhost:5000
  description: Backend direct (python run.py)
- url: http://localhost:8888
  description: Docker Compose (via reverse proxy)
paths:
  /:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiInfo'
      summary: API root
      tags:
      - Health
      operationId: getApiRoot
      x-visibility: public
  /health:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
      summary: Health check
      tags:
      - Health
      operationId: getHealth
      x-visibility: public
  /api/health:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
      summary: Health check (compat path)
      tags:
      - Health
      description: Used by Docker health checks and reverse-proxy probes.
      operationId: getApiHealthCompat
      x-visibility: public
  /api/health/ready:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatus'
      tags:
      - Health
      summary: Readiness check
      operationId: getReadiness
      x-visibility: internal
  /api/health/workers:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerHealth'
      tags:
      - Health
      summary: Worker health
      operationId: getWorkerHealth
      x-visibility: internal
  /metrics:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      tags:
      - Health
      summary: Prometheus metrics
      operationId: getPrometheusMetrics
      x_visibility: internal
      x-visibility: internal
  /api/policy/broker-market:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Return the full broker x market x market_type compatibility matrix.
      description: "Response shape (kept stable for the frontend):\n{\n  \"code\"\
        : 1,\n  \"data\": {\n    \"broker_markets\": {\n        \"ibkr\":   {\"USStock\"\
        : [\"spot\"]},\n        \"alpaca\": {\"USStock\": [\"spot\"], \"Crypto\":\
        \ [\"spot\"]},\n        \"binance\": {\"Crypto\":  [\"spot\", \"swap\"]},\n\
        \        ...\n    },\n    \"long_only_brokers\": [\"alpaca\", \"ibkr\"],\n\
        \    \"bot_type_markets\": {\n        \"grid\":       [\"Crypto\"],\n    \
        \    \"martingale\": [\"Crypto\"],\n        \"dca\":        [\"Crypto\", \"\
        USStock\"],\n        \"trend\":      [\"Crypto\", \"USStock\"]\n    },\n \
        \   \"live_market_categories\": [\"Crypto\", \"USStock\"]\n  }\n}"
      tags:
      - Policy
      operationId: getApiPolicyBrokerMarket
      x-visibility: public
  /api/auth/security-config:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Get public security configuration for frontend.
      description: 'Returns:

        turnstile_enabled: bool

        turnstile_site_key: str

        registration_enabled: bool

        oauth_google_enabled: bool

        oauth_github_enabled: bool'
      tags:
      - Auth
      operationId: getApiAuthSecurityConfig
      x-visibility: public
  /api/auth/turnstile-clearance:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Exchange a fresh Turnstile token for a short-lived local clearance.
      tags:
      - Auth
      operationId: postApiAuthTurnstileClearance
      x-visibility: public
  /api/auth/login:
    post:
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_CONTENT'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      summary: User login endpoint.
      description: "Request body:\n    username: str\n    password: str\n    turnstile_token:\
        \ str (optional, required if Turnstile is enabled)\n\nReturns:\n    token:\
        \ JWT token\n    userinfo: User information"
      tags:
      - Auth
      operationId: postApiAuthLogin
      x-visibility: public
  /api/auth/mfa/verify-login:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Complete a password login that was paused for TOTP verification.
      tags:
      - Auth
      operationId: postApiAuthMfaVerifyLogin
      x-visibility: public
  /api/auth/login-code:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Login with email verification code (quick login / register).
      description: 'Request body:

        email: str

        code: str (verification code)

        referral_code: str (optional, referrer''s user ID - only for new users)


        Login with email verification code (quick login / register).

        If user doesn''t exist, create a new account automatically.'
      tags:
      - Auth
      operationId: postApiAuthLoginCode
      x-visibility: public
  /api/auth/send-code:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Send verification code to email.
      description: 'Request body:

        email: str

        type: str (register, reset_password, change_password, change_email)

        turnstile_token: str (optional)'
      tags:
      - Auth
      operationId: postApiAuthSendCode
      x-visibility: public
  /api/auth/register:
    post:
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_CONTENT'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      summary: Register new user with email verification.
      description: 'Request body:

        email: str

        code: str (verification code)

        username: str

        password: str

        referral_code: str (optional, referrer''s user ID)'
      tags:
      - Auth
      operationId: postApiAuthRegister
      x-visibility: public
  /api/auth/reset-password:
    post:
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_CONTENT'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      summary: Reset password with email verification.
      description: 'Request body:

        email: str

        code: str (verification code)

        new_password: str'
      tags:
      - Auth
      operationId: postApiAuthResetPassword
      x-visibility: public
  /api/auth/change-password:
    post:
      responses:
        '422':
          $ref: '#/components/responses/UNPROCESSABLE_CONTENT'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      summary: Change password with email verification (for logged-in users).
      description: 'Request body:

        code: str (verification code sent to user''s email)

        new_password: str'
      tags:
      - Auth
      operationId: postApiAuthChangePassword
      x-visibility: public
  /api/auth/oauth/google:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Redirect to Google OAuth authorization page.
      description: "Query params:\nredirect: optional front-end URL (must be allow-listed).\
        \ When provided,\n          after successful login the user is redirected\
        \ there instead of\n          the default FRONTEND_URL. Supports multi-frontend\
        \ (PC + mobile)."
      tags:
      - Auth
      operationId: getApiAuthOauthGoogle
      x-visibility: public
  /api/auth/oauth/google/callback:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Handle Google OAuth callback
      tags:
      - Auth
      operationId: getApiAuthOauthGoogleCallback
      x-visibility: public
  /api/auth/oauth/github:
    get:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Redirect to GitHub OAuth authorization page.
      description: 'Query params:

        redirect: optional front-end URL (must be allow-listed), see oauth_google.'
      tags:
      - Auth
      operationId: getApiAuthOauthGithub
      x-visibility: public
