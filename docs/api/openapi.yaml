  /api/users/admin-orders/{order_id}/manual-confirm:
    post:
      responses:
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanErrorEnvelope'
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HumanSuccessEnvelope'
      summary: Admin-only "rescue" lever for USDT orders.
      description: "Use case: the buyer paid the correct amount to the correct receiving\n\
        address, but the on-chain reconciler missed the transaction (RPC\noutage,\
        \ exotic wallet, chain-specific edge case, off-chain mistake\nwhere the customer\
        \ used a slightly different amount than the order\nsuffix demanded, etc.).\
        \ Without this endpoint the admin's only option\nis to ``UPDATE qd_usdt_orders\
        \ ...`` by hand and then somehow trigger\n``purchase_membership``; this surface\
        \ does both atomically and leaves\nan audit trail.\n\nBody:\n    {\n     \
        \   \"tx_hash\": \"<on-chain tx hash>\",     # required\n        \"note\"\
        :    \"<free-form audit note>\"  # optional\n    }\n\nBehavior:\n    - Flips\
        \ the order to 'confirmed'.\n    - Stamps tx_hash + paid_at (if empty) + confirmed_at\
        \ + admin_note\n      + manual_confirmed_by + matched_via='manual_admin'.\n\
        \    - Calls ``purchase_membership`` exactly once per order (idempotent\n\
        \      on re-submit; already-confirmed orders only refresh the audit\n   \
        \   fields, no double-grant).\n    - Refuses ``status='cancelled'`` orders\
        \ so the admin doesn't\n      accidentally resurrect a deliberately-cancelled\
        \ refund."
      tags:
      - Users
      operationId: postApiUsersAdminOrdersOrderIdManualConfirm
      x-visibility: internal
    parameters:
    - in: path
      name: order_id
      required: true
      schema:
        type: integer
        minimum: 0
