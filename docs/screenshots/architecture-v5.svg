<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title description">
  <title id="title">QuantDinger v5 system architecture</title>
  <desc id="description">Architecture from client and agent access through data integrations, API security, core quant services, execution workers, infrastructure, observability, and the closed-loop trading workflow.</desc>

  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#155eef"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#102a56" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#159455"/>
    </marker>
    <style>
      .title { font: 800 38px Inter, "Segoe UI", Arial, sans-serif; fill: #102a56; }
      .brand { fill: url(#brand); }
      .subtitle { font: 500 17px Inter, "Segoe UI", Arial, sans-serif; fill: #52647f; }
      .section-title { font: 750 20px Inter, "Segoe UI", Arial, sans-serif; }
      .card-title { font: 700 16px Inter, "Segoe UI", Arial, sans-serif; fill: #16325c; }
      .card-sub { font: 500 12.5px Inter, "Segoe UI", Arial, sans-serif; fill: #60708a; }
      .label { font: 700 13px Inter, "Segoe UI", Arial, sans-serif; fill: #23436f; }
      .small { font: 600 11.5px Inter, "Segoe UI", Arial, sans-serif; fill: #61718a; }
      .white { fill: #ffffff; }
      .blue { fill: #155eef; }
      .green { fill: #159455; }
      .purple { fill: #7257d8; }
      .teal { fill: #078d9f; }
      .orange { fill: #d97706; }
      .red { fill: #c83256; }
    </style>
  </defs>

  <rect width="1600" height="1120" rx="22" fill="url(#page)"/>
  <rect x="28" y="28" width="1544" height="1064" rx="24" fill="none" stroke="#c9d8ee" stroke-width="2"/>

  <g transform="translate(800 62)" text-anchor="middle">
    <text class="title" x="0" y="0">Quant<tspan class="brand">Dinger</tspan> v5 Architecture</text>
    <text class="subtitle" x="0" y="31">Open-source AI Trading OS for research, strategy, backtesting, execution, and agents</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="112" width="1460" height="120" rx="18" fill="#ffffff" stroke="#8db6f6" stroke-width="2"/>
  </g>
  <circle cx="98" cy="140" r="15" fill="#155eef"/>
  <text x="98" y="146" text-anchor="middle" class="label white">1</text>
  <text x="123" y="147" class="section-title blue">Client and Agent Access</text>

  <g>
    <rect x="92" y="165" width="170" height="45" rx="10" fill="#f5f9ff" stroke="#82aef2"/>
    <text x="177" y="193" text-anchor="middle" class="card-title">Web Application</text>
    <rect x="276" y="165" width="170" height="45" rx="10" fill="#f5f9ff" stroke="#82aef2"/>
    <text x="361" y="193" text-anchor="middle" class="card-title">Mobile H5</text>
    <rect x="460" y="165" width="170" height="45" rx="10" fill="#f5f9ff" stroke="#82aef2"/>
    <text x="545" y="193" text-anchor="middle" class="card-title">Human API</text>
    <rect x="644" y="165" width="170" height="45" rx="10" fill="#f5f9ff" stroke="#82aef2"/>
    <text x="729" y="193" text-anchor="middle" class="card-title">Cursor</text>
    <rect x="828" y="165" width="170" height="45" rx="10" fill="#f5f9ff" stroke="#82aef2"/>
    <text x="913" y="193" text-anchor="middle" class="card-title">Claude Code</text>
    <rect x="1012" y="165" width="170" height="45" rx="10" fill="#f5f9ff" stroke="#82aef2"/>
    <text x="1097" y="193" text-anchor="middle" class="card-title">Codex</text>
    <rect x="1196" y="165" width="170" height="45" rx="10" fill="#f5f9ff" stroke="#82aef2"/>
    <text x="1281" y="193" text-anchor="middle" class="card-title">Custom Agents</text>
    <rect x="1380" y="165" width="126" height="45" rx="10" fill="#f5f9ff" stroke="#82aef2" stroke-dasharray="5 4"/>
    <text x="1443" y="186" text-anchor="middle" class="label">MCP Clients</text>
    <text x="1443" y="201" text-anchor="middle" class="small">and automations</text>
  </g>

  <line x1="800" y1="232" x2="800" y2="252" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="264" width="300" height="414" rx="18" fill="#f8fffb" stroke="#67be8c" stroke-width="2"/>
  </g>
  <circle cx="98" cy="292" r="15" fill="#159455"/>
  <text x="98" y="298" text-anchor="middle" class="label white">2</text>
  <text x="123" y="299" class="section-title green">Data and Integrations</text>

  <g>
    <rect x="90" y="322" width="260" height="72" rx="11" fill="#ffffff" stroke="#9bd3b3"/>
    <text x="110" y="348" class="card-title">Market Data</text>
    <text x="110" y="369" class="card-sub">OHLCV, quotes, order books, symbols</text>
    <text x="110" y="385" class="card-sub">Stocks, crypto, forex, futures</text>

    <rect x="90" y="406" width="260" height="72" rx="11" fill="#ffffff" stroke="#9bd3b3"/>
    <text x="110" y="432" class="card-title">Exchange and Broker APIs</text>
    <text x="110" y="453" class="card-sub">Binance, OKX, Bybit, Bitget, Gate, HTX</text>
    <text x="110" y="469" class="card-sub">Interactive Brokers and Alpaca</text>

    <rect x="90" y="490" width="260" height="72" rx="11" fill="#ffffff" stroke="#9bd3b3"/>
    <text x="110" y="516" class="card-title">Fundamentals and News</text>
    <text x="110" y="537" class="card-sub">Macro, earnings, economic calendar</text>
    <text x="110" y="553" class="card-sub">News, sentiment, provider APIs</text>

    <rect x="90" y="574" width="260" height="82" rx="11" fill="#ffffff" stroke="#9bd3b3"/>
    <text x="110" y="600" class="card-title">User Input</text>
    <text x="110" y="621" class="card-sub">Python indicators and strategy code</text>
    <text x="110" y="637" class="card-sub">Risk settings, credentials, policies</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="394" y="264" width="300" height="414" rx="18" fill="#fbf9ff" stroke="#9b83e8" stroke-width="2"/>
  </g>
  <circle cx="422" cy="292" r="15" fill="#7257d8"/>
  <text x="422" y="298" text-anchor="middle" class="label white">3</text>
  <text x="447" y="299" class="section-title purple">API and Security</text>

  <g>
    <rect x="414" y="322" width="260" height="58" rx="11" fill="#ffffff" stroke="#c2b5ef"/>
    <text x="434" y="347" class="card-title">Nginx Frontends</text>
    <text x="434" y="366" class="card-sub">Web and mobile delivery, API proxy</text>
    <rect x="414" y="390" width="260" height="58" rx="11" fill="#ffffff" stroke="#c2b5ef"/>
    <text x="434" y="415" class="card-title">Flask and Gunicorn API</text>
    <text x="434" y="434" class="card-sub">Validation, auth, contracts, commands</text>
    <rect x="414" y="458" width="260" height="58" rx="11" fill="#ffffff" stroke="#c2b5ef"/>
    <text x="434" y="483" class="card-title">Agent Gateway</text>
    <text x="434" y="502" class="card-sub">/api/agent/v1 and MCP tool boundary</text>
    <rect x="414" y="526" width="260" height="58" rx="11" fill="#ffffff" stroke="#c2b5ef"/>
    <text x="434" y="551" class="card-title">Scoped Access</text>
    <text x="434" y="570" class="card-sub">JWT, RBAC, token scopes, rate limits</text>
    <rect x="414" y="594" width="260" height="62" rx="11" fill="#ffffff" stroke="#c2b5ef"/>
    <text x="434" y="619" class="card-title">Audit and Safety</text>
    <text x="434" y="638" class="card-sub">Audit trail, idempotency, paper default</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="718" y="264" width="454" height="414" rx="18" fill="#f8fbff" stroke="#6f9df1" stroke-width="2"/>
  </g>
  <circle cx="746" cy="292" r="15" fill="#155eef"/>
  <text x="746" y="298" text-anchor="middle" class="label white">4</text>
  <text x="771" y="299" class="section-title blue">QuantDinger Core Platform</text>

  <g>
    <rect x="738" y="322" width="414" height="58" rx="11" fill="#ffffff" stroke="#9bbcf4"/>
    <text x="758" y="347" class="card-title">Indicator and Signal Layer</text>
    <text x="758" y="366" class="card-sub">Python overlays, factors, four-way signals, alerts</text>
    <rect x="738" y="390" width="414" height="58" rx="11" fill="#ffffff" stroke="#9bbcf4"/>
    <text x="758" y="415" class="card-title">Strategy Runtime v2</text>
    <text x="758" y="434" class="card-sub">Intents, sizing, risk guards, state, reconciliation</text>
    <rect x="738" y="458" width="414" height="58" rx="11" fill="#ffffff" stroke="#9bbcf4"/>
    <text x="758" y="483" class="card-title">Backtest and Experiment Engine</text>
    <text x="758" y="502" class="card-sub">Pinned inputs, metrics, equity curves, reproducible runs</text>
    <rect x="738" y="526" width="414" height="58" rx="11" fill="#ffffff" stroke="#9bbcf4"/>
    <text x="758" y="551" class="card-title">AI Analysis and Generation</text>
    <text x="758" y="570" class="card-sub">Multi-provider LLMs, tools, skills, reviews, reports</text>
    <rect x="738" y="594" width="414" height="62" rx="11" fill="#ffffff" stroke="#9bbcf4"/>
    <text x="758" y="619" class="card-title">Portfolio, Accounts and Billing</text>
    <text x="758" y="638" class="card-sub">Positions, orders, portfolios, credits, membership, USDT</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1196" y="264" width="334" height="414" rx="18" fill="#f6feff" stroke="#58b9c6" stroke-width="2"/>
  </g>
  <circle cx="1224" cy="292" r="15" fill="#078d9f"/>
  <text x="1224" y="298" text-anchor="middle" class="label white">5</text>
  <text x="1249" y="299" class="section-title teal">Execution and Output</text>

  <g>
    <rect x="1216" y="322" width="294" height="72" rx="11" fill="#ffffff" stroke="#92d0d8"/>
    <text x="1236" y="348" class="card-title">Paper and Live Trading</text>
    <text x="1236" y="369" class="card-sub">Explicit promotion and operator opt-in</text>
    <text x="1236" y="385" class="card-sub">Order limits, kill switches, reconciliation</text>
    <rect x="1216" y="406" width="294" height="72" rx="11" fill="#ffffff" stroke="#92d0d8"/>
    <text x="1236" y="432" class="card-title">Venue Execution</text>
    <text x="1236" y="453" class="card-sub">Crypto exchanges, IBKR and Alpaca</text>
    <text x="1236" y="469" class="card-sub">Spot, derivatives, stocks and ETFs</text>
    <rect x="1216" y="490" width="294" height="72" rx="11" fill="#ffffff" stroke="#92d0d8"/>
    <text x="1236" y="516" class="card-title">Alerts and Notifications</text>
    <text x="1236" y="537" class="card-sub">Telegram, email, SMS, Discord</text>
    <text x="1236" y="553" class="card-sub">Webhooks and in-app notifications</text>
    <rect x="1216" y="574" width="294" height="82" rx="11" fill="#ffffff" stroke="#92d0d8"/>
    <text x="1236" y="600" class="card-title">Operator Experience</text>
    <text x="1236" y="621" class="card-sub">Dashboards, account snapshots, logs</text>
    <text x="1236" y="637" class="card-sub">Strategy health and performance</text>
  </g>

  <line x1="370" y1="470" x2="394" y2="470" stroke="#159455" stroke-width="4" marker-end="url(#arrow-green)"/>
  <line x1="694" y1="470" x2="718" y2="470" stroke="#7257d8" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <line x1="1172" y1="470" x2="1196" y2="470" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="706" width="1090" height="112" rx="18" fill="#fffaf3" stroke="#efa64c" stroke-width="2"/>
  </g>
  <circle cx="98" cy="734" r="15" fill="#d97706"/>
  <text x="98" y="740" text-anchor="middle" class="label white">6</text>
  <text x="123" y="741" class="section-title orange">Process and Worker Plane</text>

  <g>
    <rect x="94" y="760" width="186" height="38" rx="9" fill="#ffffff" stroke="#efbd78"/>
    <text x="187" y="785" text-anchor="middle" class="label">Migration</text>
    <rect x="294" y="760" width="194" height="38" rx="9" fill="#ffffff" stroke="#efbd78"/>
    <text x="391" y="785" text-anchor="middle" class="label">Trading Worker</text>
    <rect x="502" y="760" width="194" height="38" rx="9" fill="#ffffff" stroke="#efbd78"/>
    <text x="599" y="785" text-anchor="middle" class="label">Scheduler Worker</text>
    <rect x="710" y="760" width="194" height="38" rx="9" fill="#ffffff" stroke="#efbd78"/>
    <text x="807" y="785" text-anchor="middle" class="label">Celery Worker</text>
    <rect x="918" y="760" width="218" height="38" rx="9" fill="#ffffff" stroke="#efbd78"/>
    <text x="1027" y="785" text-anchor="middle" class="label">Celery Beat</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1184" y="706" width="346" height="112" rx="18" fill="#fff7f9" stroke="#e4899e" stroke-width="2"/>
  </g>
  <circle cx="1212" cy="734" r="15" fill="#c83256"/>
  <text x="1212" y="740" text-anchor="middle" class="label white">7</text>
  <text x="1237" y="741" class="section-title red">Observability</text>
  <text x="1206" y="772" class="label">JSON logs · Request IDs · Metrics</text>
  <text x="1206" y="795" class="card-sub">Prometheus · Grafana · Alertmanager</text>

  <g filter="url(#shadow)">
    <rect x="70" y="844" width="1460" height="98" rx="18" fill="#f8fbff" stroke="#8db6f6" stroke-width="2"/>
  </g>
  <circle cx="98" cy="872" r="15" fill="#155eef"/>
  <text x="98" y="878" text-anchor="middle" class="label white">8</text>
  <text x="123" y="879" class="section-title blue">Foundation and Infrastructure</text>
  <g>
    <rect x="94" y="897" width="200" height="28" rx="7" fill="#ffffff" stroke="#a8c4ef"/>
    <text x="194" y="916" text-anchor="middle" class="small">PostgreSQL 18 · System of record</text>
    <rect x="308" y="897" width="190" height="28" rx="7" fill="#ffffff" stroke="#a8c4ef"/>
    <text x="403" y="916" text-anchor="middle" class="small">Redis cache · Disposable</text>
    <rect x="512" y="897" width="204" height="28" rx="7" fill="#ffffff" stroke="#a8c4ef"/>
    <text x="614" y="916" text-anchor="middle" class="small">Redis jobs · Durable queues</text>
    <rect x="730" y="897" width="196" height="28" rx="7" fill="#ffffff" stroke="#a8c4ef"/>
    <text x="828" y="916" text-anchor="middle" class="small">Secret and credential encryption</text>
    <rect x="940" y="897" width="180" height="28" rx="7" fill="#ffffff" stroke="#a8c4ef"/>
    <text x="1030" y="916" text-anchor="middle" class="small">Docker Compose · GHCR</text>
    <rect x="1134" y="897" width="180" height="28" rx="7" fill="#ffffff" stroke="#a8c4ef"/>
    <text x="1224" y="916" text-anchor="middle" class="small">Python 3.12 · Self-hosted</text>
    <rect x="1328" y="897" width="178" height="28" rx="7" fill="#ffffff" stroke="#a8c4ef"/>
    <text x="1417" y="916" text-anchor="middle" class="small">CI · Security · Release gates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="968" width="1460" height="98" rx="18" fill="#ffffff" stroke="#75a7f5" stroke-width="2"/>
  </g>
  <circle cx="98" cy="996" r="15" fill="#155eef"/>
  <text x="98" y="1002" text-anchor="middle" class="label white">9</text>
  <text x="123" y="1003" class="section-title blue">Closed-Loop AI Trading Workflow</text>
  <g class="label" text-anchor="middle">
    <text x="164" y="1042">Research</text>
    <text x="337" y="1042">Build</text>
    <text x="510" y="1042">Backtest</text>
    <text x="683" y="1042">Validate</text>
    <text x="856" y="1042">Promote</text>
    <text x="1029" y="1042">Execute</text>
    <text x="1202" y="1042">Monitor</text>
    <text x="1375" y="1042">Feedback</text>
  </g>
  <g stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)">
    <line x1="210" y1="1037" x2="285" y2="1037"/>
    <line x1="383" y1="1037" x2="458" y2="1037"/>
    <line x1="556" y1="1037" x2="631" y2="1037"/>
    <line x1="729" y1="1037" x2="804" y2="1037"/>
    <line x1="902" y1="1037" x2="977" y2="1037"/>
    <line x1="1075" y1="1037" x2="1150" y2="1037"/>
    <line x1="1248" y1="1037" x2="1323" y2="1037"/>
  </g>
  <path d="M 1375 1054 C 1375 1083, 164 1083, 164 1054" fill="none" stroke="#7c8da8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-blue)"/>
</svg>
