global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: quantdinger-api
    metrics_path: /metrics
    static_configs:
      - targets: [backend:5000]

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: redis-cache
    static_configs:
      - targets: [redis-cache-exporter:9121]

  - job_name: redis-jobs
    static_configs:
      - targets: [redis-jobs-exporter:9121]

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
